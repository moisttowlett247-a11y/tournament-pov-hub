name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * 1,4' # Runs automatically every Monday and Thursday at noon
  workflow_dispatch: # Allows you to click a button and run it manually anytime

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Heartbeat Ping
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_PROJECT_URL }}healthcheck?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
